<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<title>TempMail</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#050508;--card:#0e0e16;--card2:#16161f;--border:#ffffff08;--border2:#4fffb022;
  --green:#4fffb0;--green2:#4fffb010;--green3:#4fffb030;--red:#ff4f6b;--red2:#ff4f6b12;
  --text:#eeeef5;--muted:#5a5a72;--dim:#2a2a38;
  --mono:'Space Mono',monospace;--sans:'Inter',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:420px;margin:0 auto;padding:0 0 100px}
#loader{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .4s ease}
#loader.hide{opacity:0;pointer-events:none}
.loader-ring{width:40px;height:40px;border:2px solid var(--dim);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
.loader-txt{font-family:var(--mono);font-size:13px;color:var(--green);letter-spacing:.1em}
@keyframes spin{to{transform:rotate(360deg)}}
.header{padding:24px 20px 0;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon{width:36px;height:36px;background:var(--green2);border:1px solid var(--green3);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.brand-name{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--green);letter-spacing:.08em}
.brand-sub{font-size:10px;color:var(--muted);margin-top:1px}
.live{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);background:var(--card);border:1px solid var(--border);padding:5px 10px;border-radius:20px}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 2s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.email-box{margin:20px 20px 0;background:var(--card);border:1px solid var(--border2);border-radius:16px;overflow:hidden;position:relative}
.email-box::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--green),transparent)}
.email-top{padding:18px 18px 14px;border-bottom:1px solid var(--border)}
.email-label{font-size:9px;font-weight:600;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.email-addr{font-family:var(--mono);font-size:14px;color:var(--green);word-break:break-all;line-height:1.5;min-height:21px}
.email-addr.loading{color:var(--dim);animation:pulse 1.2s ease infinite}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
.email-bottom{display:flex}
.btn-copy{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:13px;background:transparent;border:none;border-right:1px solid var(--border);color:var(--text);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;transition:background .15s}
.btn-copy:active{background:var(--green2)}
.btn-copy.done{color:var(--green)}
.btn-regen{display:flex;align-items:center;justify-content:center;width:52px;background:transparent;border:none;color:var(--muted);cursor:pointer;transition:all .15s}
.btn-regen:active{color:var(--green)}
.btn-regen svg{transition:transform .4s}
.btn-regen.spin svg{animation:spin .5s linear}
.ttl{margin:10px 20px 0;display:flex;align-items:center;gap:8px}
.ttl-bar{flex:1;height:2px;background:var(--dim);border-radius:1px;overflow:hidden}
.ttl-fill{height:100%;background:var(--green);border-radius:1px;animation:drain 1200s linear forwards}
@keyframes drain{from{width:100%}to{width:0%}}
.ttl-txt{font-size:10px;color:var(--muted);white-space:nowrap}
.inbox-head{padding:24px 20px 10px;display:flex;align-items:center;justify-content:space-between}
.inbox-title{font-size:11px;font-weight:600;letter-spacing:.12em;color:var(--muted);text-transform:uppercase}
.badge{font-family:var(--mono);font-size:10px;padding:3px 9px;border-radius:20px;background:var(--card);border:1px solid var(--border);color:var(--muted);transition:all .2s}
.badge.on{background:var(--green2);border-color:var(--green3);color:var(--green)}
.refresh-row{display:flex;align-items:center;gap:6px;padding:0 20px 12px}
.refresh-bar{width:60px;height:1px;background:var(--dim);border-radius:1px;overflow:hidden}
.refresh-fill{height:100%;background:var(--green);animation:refill 5s linear infinite}
@keyframes refill{from{width:100%}to{width:0%}}
.refresh-txt{font-size:10px;color:var(--dim)}
.list{padding:0 20px;display:flex;flex-direction:column;gap:8px}
.mail{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:15px;cursor:pointer;transition:all .15s;animation:up .25s ease both}
@keyframes up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.mail:active{transform:scale(.98);background:var(--card2)}
.mail:hover{border-color:var(--border2)}
.mail-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:5px}
.mail-from{font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:65%}
.mail-time{font-family:var(--mono);font-size:9px;color:var(--muted);flex-shrink:0}
.mail-subject{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px}
.mail-preview{font-size:11px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.empty{text-align:center;padding:60px 20px}
.empty-icon{font-size:44px;opacity:.2;margin-bottom:12px}
.empty-h{font-size:15px;font-weight:600;color:var(--muted);margin-bottom:6px}
.empty-p{font-size:12px;color:var(--dim);line-height:1.6}
.overlay{position:fixed;inset:0;background:#000000bb;backdrop-filter:blur(6px);z-index:100;display:none;align-items:flex-end}
.overlay.open{display:flex;animation:fadein .15s ease}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.modal{width:100%;max-height:88vh;background:var(--card);border:1px solid var(--border);border-top-left-radius:22px;border-top-right-radius:22px;display:flex;flex-direction:column;animation:slideup .2s cubic-bezier(.32,1,.32,1)}
@keyframes slideup{from{transform:translateY(30px)}to{transform:none}}
.modal-handle{width:32px;height:3px;background:var(--dim);border-radius:2px;margin:12px auto 0;flex-shrink:0}
.modal-hd{padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-from{font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:5px}
.modal-subj{font-size:16px;font-weight:600;color:var(--text);line-height:1.3}
.modal-date{font-size:10px;color:var(--dim);margin-top:6px}
.modal-body{flex:1;overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch}
.modal-txt{font-size:13px;color:var(--muted);line-height:1.8;white-space:pre-wrap;word-break:break-word}
.modal-ft{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.btn-close{flex:1;padding:12px;background:var(--card2);border:1px solid var(--border);color:var(--muted);border-radius:12px;font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer}
.btn-del{padding:12px 18px;background:var(--red2);border:1px solid #ff4f6b20;color:var(--red);border-radius:12px;font-size:16px;cursor:pointer}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:22px;font-size:13px;font-weight:500;z-index:200;white-space:nowrap;transition:transform .25s cubic-bezier(.34,1.56,.64,1)}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="loader"><div class="loader-ring"></div><div class="loader-txt">TEMPMAIL</div></div>
<div class="wrap" id="app" style="display:none">
  <div class="header">
    <div class="brand">
      <div class="brand-icon">📬</div>
      <div><div class="brand-name">TEMPMAIL</div><div class="brand-sub">by Telegram</div></div>
    </div>
    <div class="live"><div class="live-dot"></div><span id="liveText">En ligne</span></div>
  </div>
  <div class="email-box">
    <div class="email-top">
      <div class="email-label">Ton adresse temporaire</div>
      <div class="email-addr loading" id="emailAddr">chargement...</div>
    </div>
    <div class="email-bottom">
      <button class="btn-copy" id="copyBtn" onclick="copyEmail()">
        <span id="copyIco">📋</span><span id="copyTxt">Copier l'adresse</span>
      </button>
      <button class="btn-regen" id="regenBtn" onclick="refreshInbox()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M1 8A7 7 0 1 0 3.5 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M3.5 1v2.5H1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="ttl">
    <div class="ttl-bar"><div class="ttl-fill"></div></div>
    <span class="ttl-txt">Expire dans 20 min</span>
  </div>
  <div class="inbox-head">
    <span class="inbox-title">Boite de reception</span>
    <span class="badge" id="badge">0</span>
  </div>
  <div class="refresh-row">
    <div class="refresh-bar"><div class="refresh-fill"></div></div>
    <span class="refresh-txt">Rafraichissement auto</span>
  </div>
  <div class="list" id="list">
    <div class="empty">
      <div class="empty-icon">📭</div>
      <div class="empty-h">Aucun email</div>
      <div class="empty-p">Les emails envoyes a ton adresse<br>apparaitront ici automatiquement.</div>
    </div>
  </div>
</div>
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-hd">
      <div class="modal-from" id="mFrom"></div>
      <div class="modal-subj" id="mSubj"></div>
      <div class="modal-date" id="mDate"></div>
    </div>
    <div class="modal-body"><div class="modal-txt" id="mBody"></div></div>
    <div class="modal-ft">
      <button class="btn-close" onclick="closeModal()">Fermer</button>
      <button class="btn-del" onclick="deleteMail()">🗑</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
const API = 'https://tempgram.xyz';

let userId=null,userEmail=null,emails=[],currentId=null;
const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();}
const user=tg?.initDataUnsafe?.user;
if(user?.id)userId=user.id.toString();
if(!userId){const p=new URLSearchParams(location.search);userId=p.get('userId')||'test123';}
async function init(){
  try{
    const r=await fetch(`${API}/generate-email?userId=${userId}`);
    const d=await r.json();
    userEmail=d.email;
    const el=document.getElementById('emailAddr');
    el.textContent=userEmail;el.classList.remove('loading');
    await refreshInbox();
    setInterval(refreshInbox,5000);
  }catch(e){toast('Erreur de connexion');document.getElementById('liveText').textContent='Hors ligne';}
  finally{document.getElementById('loader').classList.add('hide');document.getElementById('app').style.display='block';}
}
async function refreshInbox(){
  const btn=document.getElementById('regenBtn');btn.classList.add('spin');
  try{
    const r=await fetch(`${API}/inbox?userId=${userId}`);
    const d=await r.json();emails=d.emails||[];render();
    const b=document.getElementById('badge');b.textContent=emails.length;b.className='badge'+(emails.length>0?' on':'');
    document.getElementById('liveText').textContent='En ligne';
  }catch(e){document.getElementById('liveText').textContent='Hors ligne';}
  finally{btn.classList.remove('spin');}
}
function render(){
  const list=document.getElementById('list');
  if(!emails.length){list.innerHTML=`<div class="empty"><div class="empty-icon">📭</div><div class="empty-h">Aucun email</div><div class="empty-p">Les emails envoyes a ton adresse<br>apparaitront ici.</div></div>`;return;}
  list.innerHTML='';
  emails.forEach((e,i)=>{
    const d=document.createElement('div');d.className='mail';d.style.animationDelay=`${i*.04}s`;d.onclick=()=>openMail(e.id);
    const preview=(e.body||'').replace(/\s+/g,' ').trim().slice(0,70);
    d.innerHTML=`<div class="mail-row"><span class="mail-from">${esc(e.from)}</span><span class="mail-time">${relTime(e.date)}</span></div><div class="mail-subject">${esc(e.subject)}</div><div class="mail-preview">${esc(preview)||'...'}</div>`;
    list.appendChild(d);
  });
}
function openMail(id){
  const e=emails.find(x=>x.id===id);if(!e)return;currentId=id;
  document.getElementById('mFrom').textContent=`De : ${e.from}`;
  document.getElementById('mSubj').textContent=e.subject||'(sans objet)';
  document.getElementById('mDate').textContent=fullDate(e.date);
  document.getElementById('mBody').textContent=e.body||'(email vide)';
  document.getElementById('overlay').classList.add('open');
  tg?.HapticFeedback?.impactOccurred('light');
}
function closeModal(ev){
  if(ev&&ev.target!==document.getElementById('overlay'))return;
  document.getElementById('overlay').classList.remove('open');currentId=null;
}
async function deleteMail(){
  if(!currentId)return;
  try{
    await fetch(`${API}/email/${currentId}?userId=${userId}`,{method:'DELETE'});
    emails=emails.filter(e=>e.id!==currentId);render();
    document.getElementById('badge').textContent=emails.length;
    document.getElementById('badge').className='badge'+(emails.length>0?' on':'');
    document.getElementById('overlay').classList.remove('open');toast('Supprime');
  }catch(e){toast('Erreur');}
}
async function copyEmail(){
  if(!userEmail)return;
  try{await navigator.clipboard.writeText(userEmail);}
  catch{const t=document.createElement('textarea');t.value=userEmail;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);}
  document.getElementById('copyIco').textContent='✅';document.getElementById('copyTxt').textContent='Copie !';
  document.getElementById('copyBtn').classList.add('done');
  tg?.HapticFeedback?.impactOccurred('medium');toast('Adresse copiee !');
  setTimeout(()=>{document.getElementById('copyIco').textContent='📋';document.getElementById('copyTxt').textContent="Copier l'adresse";document.getElementById('copyBtn').classList.remove('done');},2000);
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function relTime(ts){const d=new Date(ts),diff=Date.now()-d,m=Math.floor(diff/60000);if(m<1)return'maintenant';if(m<60)return`${m}min`;if(m<1440)return`${Math.floor(m/60)}h`;return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'});}
function fullDate(ts){return new Date(ts).toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
init();
</script>
</body>
</html>
