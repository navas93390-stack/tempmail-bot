```
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Noise overlay ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

.app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 16px; }

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px 0 24px;
}
.logo {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.header-title { font-family: var(--mono); font-size: 15px; font-weight: 700; letter-spacing: 0.05em; }
.header-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
.status-dot {
  margin-left: auto;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* ── Email card ── */
.email-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}
.email-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
}
.email-label {
  font-size: 10px;
  font-family: var(--mono);
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 10px;
}
.email-address {
  font-family: var(--mono);
  font-size: 14px;
  color: var(--accent);
  word-break: break-all;
  margin-bottom: 16px;
  line-height: 1.5;
}
.email-address.loading {
  color: var(--muted);
  animation: blink 1.2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

.copy-btn {
  width: 100%;
  padding: 11px;
  background: transparent;
  border: 1px solid var(--accent);
  border-radius: 10px;
  color: var(--accent);
  font-family: var(--mono);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.copy-btn:hover { background: rgba(0,229,160,0.08); }
.copy-btn.copied {
  border-color: var(--accent2);
  color: var(--accent2);
  background: rgba(0,136,255,0.08);
}

/* ── Inbox ── */
.inbox-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.inbox-title {
  font-family: var(--mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
}
.refresh-info {
  font-size: 10px;
  color: var(--muted);
  display: flex; align-items: center; gap: 5px;
}
.refresh-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent2);
  animation: pulse 3s ease-in-out infinite;
}
.badge {
  background: var(--accent);
  color: #000;
  font-size: 10px;
  font-weight: 700;
  font-family: var(--mono);
  padding: 2px 7px;
  border-radius: 20px;
  margin-left: 8px;
}

/* ── Email list ── */
.email-list { display: flex; flex-direction: column; gap: 8px; }

.email-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.18s;
  animation: slideIn 0.3s ease forwards;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.email-item:hover { border-color: var(--accent); background: #13131c; }
.email-item.unread { border-left: 3px solid var(--accent); }

.email-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.email-from {
  font-size: 12px;
  color: var(--accent2);
  font-family: var(--mono);
  max-width: 60%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.email-time {
  font-size: 10px;
  color: var(--muted);
  font-family: var(--mono);
}
.email-subject {
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.email-preview {
  font-size: 11px;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.ttl-bar {
  height: 2px;
  background: var(--border);
  border-radius: 2px;
  margin-top: 10px;
  overflow: hidden;
}
.ttl-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 2px;
  transition: width 1s linear;
}

/* ── Empty state ── */
.empty {
  text-align: center;
  padding: 48px 24px;
  color: var(--muted);
}
.empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
.empty-title { font-size: 14px; font-weight: 500; margin-bottom: 6px; }
.empty-sub { font-size: 12px; line-height: 1.6; }

/* ── Detail modal ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(8px);
  z-index: 100;
  display: none;
  align-items: flex-end;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px 20px 0 0;
  padding: 20px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.modal-handle {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 20px;
}
.modal-from { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.modal-subject {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 4px;
  line-height: 1.4;
}
.modal-date { font-size: 11px; color: var(--muted); margin-bottom: 20px; }
.modal-divider { height: 1px; background: var(--border); margin-bottom: 16px; }
.modal-body {
  font-size: 13px;
  line-height: 1.7;
  color: #c8c8d8;
  white-space: pre-wrap;
  word-break: break-word;
}
.modal-close {
  position: absolute;
  top: 20px; right: 20px;
  background: var(--border);
  border: none;
  color: var(--muted);
  width: 30px; height: 30px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
}

/* ── Error ── */
.error-banner {
  background: rgba(255,68,102,0.1);
  border: 1px solid rgba(255,68,102,0.3);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 12px;
  color: var(--danger);
  margin-bottom: 12px;
  display: none;
}
.error-banner.show { display: block; }

  </div>

  <!-- Detail modal -->

  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" id="modal">
      <div class="modal-handle"></div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
      <div class="modal-from" id="modalFrom"></div>
      <div class="modal-subject" id="modalSubject"></div>
      <div class="modal-date" id="modalDate"></div>

      <div class="modal-body" id="modalBody"></div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <script>
    // ─── Config ─────────────────────────────────────────────────────────────
    const BACKEND = 'https://tondomaine.com/api'; // ← Remplace par ton URL backend
    const REFRESH_INTERVAL = 4000; // 4 secondes

    // ─── Telegram SDK ───────────────────────────────────────────────────────
    const tg = window.Telegram?.WebApp;
    let userId = null;

    if (tg) {
      tg.ready();
      tg.expand();
      tg.setHeaderColor('#0a0a0f');
      tg.setBackgroundColor('#0a0a0f');
      userId = tg.initDataUnsafe?.user?.id;
    }

    // Fallback pour les tests hors Telegram
    if (!userId) {
      userId = 'DEMO_USER';
    }

    // ─── State ──────────────────────────────────────────────────────────────
    let currentEmail = null;
    let emails = [];
    let seenIds = new Set();
    let TTL_MS = 20 * 60 * 1000;

    // ─── Init ────────────────────────────────────────────────────────────────
    async function init() {
      await fetchEmail();
      await fetchInbox();
      setInterval(fetchInbox, REFRESH_INTERVAL);
    }

    // ─── Fetch email ─────────────────────────────────────────────────────────
    async function fetchEmail() {
      try {
        const res = await fetch(`${BACKEND}/generate-email?userId=${userId}`);
        const data = await res.json();
        currentEmail = data.email;

        const el = document.getElementById('emailDisplay');
        el.textContent = currentEmail;
        el.classList.remove('loading');
        hideError();
      } catch (e) {
        showError('Impossible de se connecter au serveur.');
      }
    }

    // ─── Fetch inbox ─────────────────────────────────────────────────────────
    async function fetchInbox() {
      if (!userId) return;
      try {
        const res = await fetch(`${BACKEND}/inbox?userId=${userId}`);
        const data = await res.json();
        emails = data.emails || [];
        
        // Notif Telegram si nouvel email
        const newEmails = emails.filter(e => !seenIds.has(e.id));
        if (newEmails.length > 0 && seenIds.size > 0) {
          tg?.HapticFeedback?.notificationOccurred('success');
        }
        newEmails.forEach(e => seenIds.add(e.id));

        renderInbox();
        hideError();
      } catch (e) {
        // silently fail on refresh
      }
    }

    // ─── Render inbox ─────────────────────────────────────────────────────────
    function renderInbox() {
      const list = document.getElementById('emailList');
      const badge = document.getElementById('countBadge');
      badge.textContent = emails.length;

      if (emails.length === 0) {
        list.innerHTML = `
          <div class="empty">
            <div class="empty-icon">✉️</div>
            <div class="empty-title">Aucun email pour l'instant</div>
            <div class="empty-sub">Copie ton adresse et envoie un email.<br>Il apparaîtra ici automatiquement.</div>
          </div>`;
        return;
      }

      list.innerHTML = emails.map((email, i) => {
        const timeLeft = email.expiresAt - Date.now();
        const pct = Math.max(0, Math.min(100, (timeLeft / TTL_MS) * 100));
        const isNew = !seenIds.has(email.id);

        return `
          <div class="email-item ${isNew ? 'unread' : ''}" 
               onclick="openEmail(${i})"
               style="animation-delay:${i * 0.05}s">
            <div class="email-meta">
              <span class="email-from">${escHtml(email.from)}</span>
              <span class="email-time">${formatTime(email.date)}</span>
            </div>
            <div class="email-subject">${escHtml(email.subject)}</div>
            <div class="email-preview">${escHtml((email.body || '').trim().substring(0, 80))}</div>
            <div class="ttl-bar">
              <div class="ttl-fill" style="width:${pct}%"></div>
            </div>
          </div>`;
      }).join('');
    }

    // ─── Open email detail ────────────────────────────────────────────────────
    function openEmail(index) {
      const email = emails[index];
      if (!email) return;

      seenIds.add(email.id);

      document.getElementById('modalFrom').textContent = `De : ${email.from}`;
      document.getElementById('modalSubject').textContent = email.subject;
      document.getElementById('modalDate').textContent = new Date(email.date).toLocaleString('fr-FR');
      document.getElementById('modalBody').textContent = email.body || '(email vide)';
      document.getElementById('modalOverlay').classList.add('open');

      tg?.HapticFeedback?.selectionChanged();
    }

    function closeModal(e) {
      if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
    }
    function closeModalDirect() {
      document.getElementById('modalOverlay').classList.remove('open');
    }

    // ─── Copy ─────────────────────────────────────────────────────────────────
    async function copyEmail() {
      if (!currentEmail) return;
      try {
        await navigator.clipboard.writeText(currentEmail);
      } catch {
        // fallback
        const ta = document.createElement('textarea');
        ta.value = currentEmail;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
      }

      const btn = document.getElementById('copyBtn');
      const icon = document.getElementById('copyIcon');
      const text = document.getElementById('copyText');
      btn.classList.add('copied');
      icon.textContent = '✓';
      text.textContent = 'Copié !';
      tg?.HapticFeedback?.notificationOccurred('success');
      setTimeout(() => {
        btn.classList.remove('copied');
        icon.textContent = '⎘';
        text.textContent = 'Copier l\'adresse';
      }, 2000);
    }

    // ─── Helpers ──────────────────────────────────────────────────────────────
    function formatTime(ts) {
      const d = new Date(ts);
      const now = new Date();
      const diffMs = now - d;
      if (diffMs < 60000) return 'À l\'instant';
      if (diffMs < 3600000) return `il y a ${Math.floor(diffMs/60000)}min`;
      if (d.toDateString() === now.toDateString()) 
        return d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
      return d.toLocaleDateString('fr-FR');
    }

    function escHtml(str) {
      return (str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function showError(msg) {
      const el = document.getElementById('errorBanner');
      el.textContent = '⚠️ ' + msg;
      el.classList.add('show');
    }
    function hideError() {
      document.getElementById('errorBanner').classList.remove('show');
    }

    // ─── Start ────────────────────────────────────────────────────────────────
    init();
  </script>
